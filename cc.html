<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="utf-8">
<title>Correcção de Cargas V3</title>
<style>
body{margin:0;background:#dfe5ef;font-family:Calibri,Arial,sans-serif}
.top{background:#0a18d8;color:#fff;text-align:center;padding:14px;font-size:28px;font-weight:700}
.tabs{display:flex;justify-content:center;gap:4px;padding:10px;background:#cfd8f8}
.tabs button{background:#0a18d8;color:#fff;border:none;padding:10px 18px;cursor:pointer}
.sheet{display:none;padding:30px}
.sheet.active{display:block}
.canvas{width:1000px;margin:auto;background:#fff;border:1px solid #222;padding:40px;min-height:500px}
.row{display:flex;justify-content:center;gap:20px;margin-bottom:20px}
.box{width:180px}
.lbl{background:#0a18d8;color:#fff;text-align:center;padding:8px;font-weight:bold;border:1px solid #222}
.cell{border:1px solid #222;background:#fff;height:42px}
.cell input{width:100%;height:100%;border:none;text-align:center;font-size:18px}
.leftblock{width:140px;margin:40px 0}
.resultrow{display:flex;justify-content:center;gap:0;margin-top:30px}
.rlabel{width:250px;background:#0a18d8;color:#fff;padding:10px;border:1px solid #222}
.rvalue{width:160px;background:#bff5e6;padding:10px;border:1px solid #222;text-align:center;font-weight:bold}
.rkg{width:80px;background:#fff;padding:10px;border:1px solid #222;text-align:center}
.neg{color:red}
.title{font-size:22px;text-align:center;margin-bottom:20px;font-weight:bold}
</style>
</head>
<body>
<div class="top">Correcção de Cargas</div>
<div class="tabs">
<button onclick="show('ac')">Acidez</button>
<button onclick="show('bx')">Brixº</button>
<button onclick="show('cl')">Cloretos</button>
<button onclick="show('ra')">Ratio</button>
<button onclick="show('co')">Consistência</button>
<button onclick="show('gu')">Acidez GUD</button>
</div>

<div id="ac" class="sheet active"></div>
<div id="gu" class="sheet"></div>
<div id="bx" class="sheet"></div>
<div id="cl" class="sheet"></div>
<div id="ra" class="sheet"></div>
<div id="co" class="sheet"></div>

<script>
function show(id){document.querySelectorAll('.sheet').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active')}
function n(v){return parseFloat(v)||0}

function acidezPage(id,p,t){
document.getElementById(id).innerHTML=`
<div class="canvas">
<div class="title">${t}</div>

<div class="row">
<div class="box"><div class="lbl">QUANTIDADE CARGA</div><div class="cell"><input id="${p}q" value="12000" oninput="calc${p}()"></div></div>
<div class="box"><div class="lbl">ACIDEZ CARGA</div><div class="cell"><input id="${p}c" value="0.17" oninput="calc${p}()"></div></div>
<div class="box"><div class="lbl">ACIDEZ PRETENDIDA</div><div class="cell"><input id="${p}p" value="0.35" oninput="calc${p}()"></div></div>
</div>

<div class="leftblock">
<div class="lbl">ACIDEZ</div>
<div class="cell"><input id="${p}a" value="40" oninput="calc${p}()"></div>
</div>

<div class="resultrow"><div class="rlabel">Factor</div><div class="rvalue" id="${p}f"></div><div class="rkg"></div></div>
<div class="resultrow"><div class="rlabel">Concentrado Limão</div><div class="rvalue" id="${p}l"></div><div class="rkg">KG</div></div>
<div class="resultrow"><div class="rlabel">Ácido Cítrico</div><div class="rvalue" id="${p}r"></div><div class="rkg">KG</div></div>
</div>`;
}

acidezPage('ac','a','ACIDEZ');
acidezPage('gu','g','ACIDEZ (GUD)');

function calca(){
let q=n(aq.value),c=n(ac.value),p=n(ap.value),a=n(aa.value);
af.innerText=(100/a).toFixed(2);
let l=(p-c)*q/100*(100/a);
let r=q*(p-c)/100;
al.innerHTML='<span class="'+(l<0?'neg':'')+'">'+l.toFixed(2)+'</span>';
ar.innerHTML='<span class="'+(r<0?'neg':'')+'">'+r.toFixed(2)+'</span>';
}
function calcg(){
let q=n(gq.value),c=n(gc.value),p=n(gp.value),a=n(ga.value);
gf.innerText=(100/a).toFixed(2);
let l=(p-c)*q/100*(100/a);
let r=q*(p-c)/100;
gl.innerHTML='<span class="'+(l<0?'neg':'')+'">'+l.toFixed(2)+'</span>';
gr.innerHTML='<span class="'+(r<0?'neg':'')+'">'+r.toFixed(2)+'</span>';
}

document.getElementById('bx').innerHTML=`<div class="canvas"><div class="title">BRIXº</div>
<div class="row">
<div class="box"><div class="lbl">QUANTIDADE CARGA</div><div class="cell"><input id="bq" value="12000" oninput="calcB()"></div></div>
<div class="box"><div class="lbl">BRIX CARGA</div><div class="cell"><input id="bc" value="10" oninput="calcB()"></div></div>
<div class="box"><div class="lbl">BRIX PRETENDIDO</div><div class="cell"><input id="bp" value="12" oninput="calcB()"></div></div>
</div>
<div class="leftblock"><div class="lbl">BRIX</div><div class="cell"><input id="bb" value="80" oninput="calcB()"></div></div>
<div class="resultrow"><div class="rlabel">Água</div><div class="rvalue" id="agua"></div><div class="rkg">KG</div></div>
<div class="resultrow"><div class="rlabel">Açúcar</div><div class="rvalue" id="acucar"></div><div class="rkg">KG</div></div>
<div class="resultrow"><div class="rlabel">Xarope</div><div class="rvalue" id="xarope"></div><div class="rkg">KG</div></div>
<div class="resultrow"><div class="rlabel">Concentrado</div><div class="rvalue" id="conc"></div><div class="rkg">KG</div></div>
</div>`;

function calcB(){
let q=n(bq.value),c=n(bc.value),p=n(bp.value),b=n(bb.value);
agua.innerText=((q*c/p)-q).toFixed(2);
acucar.innerText=(q*(p-c)/100).toFixed(2);
xarope.innerText=((q*(p-c)/100)/40*100).toFixed(2);
conc.innerText=(q*(p-c)/b).toFixed(2);
}

document.getElementById('cl').innerHTML=`<div class="canvas"><div class="title">CLORETOS</div>
<div class="row">
<div class="box"><div class="lbl">QUANTIDADE CARGA</div><div class="cell"><input id="cq" value="12000" oninput="calcC()"></div></div>
<div class="box"><div class="lbl">CLORETOS CARGA</div><div class="cell"><input id="cc" value="0.10" oninput="calcC()"></div></div>
<div class="box"><div class="lbl">CLORETOS PRETENDIDOS</div><div class="cell"><input id="cp" value="0.20" oninput="calcC()"></div></div>
</div>
<div class="resultrow"><div class="rlabel">Sal</div><div class="rvalue" id="sal"></div><div class="rkg">KG</div></div></div>`;
function calcC(){sal.innerText=(n(cq.value)*(n(cp.value)-n(cc.value))/100).toFixed(2)}

document.getElementById('ra').innerHTML=`<div class="canvas"><div class="title">RATIO</div>
<div class="row"><div class="box"><div class="lbl">BRIX</div><div class="cell"><input id="rb" value="10" oninput="calcR()"></div></div>
<div class="box"><div class="lbl">ACIDEZ</div><div class="cell"><input id="rc" value="0.4" oninput="calcR()"></div></div></div>
<div class="resultrow"><div class="rlabel">Ratio</div><div class="rvalue" id="ratio"></div><div class="rkg"></div></div></div>`;
function calcR(){ratio.innerText=(n(rb.value)/n(rc.value)).toFixed(2)}

document.getElementById('co').innerHTML=`<div class="canvas"><div class="title">CONSISTÊNCIA</div>
<div class="row"><div class="box"><div class="lbl">TEMPO ESCORRIMENTO</div><div class="cell"><input id="te" value="40" oninput="calcT()"></div></div></div>
<div class="resultrow"><div class="rlabel">Consistência</div><div class="rvalue" id="cres"></div><div class="rkg"></div></div></div>`;
function calcT(){cres.innerText=(n(te.value)/4).toFixed(2)}

calca();calcg();calcB();calcC();calcR();calcT();
</script>
</body>
</html>
