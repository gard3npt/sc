<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>SC</title>

  <!-- Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:'Montserrat', sans-serif;
      background:#121417;
      color:#ffffff;
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      overflow:hidden;
      position:relative;
    }

    /* Fundo minimalista */

    .background-letters{
      position:absolute;
      inset:0;
      display:flex;
      justify-content:center;
      align-items:center;
      pointer-events:none;
      user-select:none;
    }

    /* Letras de fundo de ecran */

    .background-letters h1{
      font-size:65vw;
      font-weight:900;
      letter-spacing:4vw;
      color:rgba(255,255,255,0.05);
      filter: blur(3px);
    }

    /* Container principal */

    .container{
      width:100%;
      max-width:1000px;
      padding:40px 25px;
      z-index:2;
      text-align:center;
    }

    .title{
      font-size:4rem;
      font-weight:900;
      letter-spacing:10px;
      margin-bottom:10px;
    }

    .subtitle{
      color:#8f98a3;
      margin-bottom:60px;
      letter-spacing:3px;
      text-transform:uppercase;
      font-size:0.9rem;
    }

    /* Grid dos botões */

    .button-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(220px, 1fr));
      gap:28px;
    }

    .hub-button{
      background:#1B1F24;
      border:1px solid rgba(255,255,255,0.05);
      border-radius:20px;
      padding:28px 20px;
      text-decoration:none;
      color:white;
      font-size:1.4rem;
      font-weight:700;
      transition:0.3s ease;
      position:relative;
      overflow:hidden;
    }

    .hub-button:hover{
      transform:translateY(-5px);
      background:#232931;
      border-color:rgba(255,255,255,0.12);
      box-shadow:0 10px 30px rgba(0,0,0,0.3);
    }

    .hub-button::before{
      content:"";
      position:absolute;
      top:0;
      left:-100%;
      width:100%;
      height:100%;
      background:linear-gradient(
        120deg,
        transparent,
        rgba(255,255,255,0.05),
        transparent
      );
      transition:0.5s;
    }

    .hub-button:hover::before{
      left:100%;
    }

    footer{
      margin-top:60px;
      color:#5e6670;
      font-size:0.8rem;
      letter-spacing:2px;
    }

    /* Mobile */

    @media(max-width:700px){

      .title{
        font-size:2.5rem;
        letter-spacing:5px;
      }

      .subtitle{
        margin-bottom:40px;
      }

      .hub-button{
        padding:24px 16px;
        font-size:1.2rem;
      }

      .background-letters h1{
        font-size:40vw;
      }

    }

  </style>
</head>

<body>

  <!-- Letras de fundo -->

  <div class="background-letters"><h1>SC</h1>
  
  </div>

  <!-- Conteúdo -->

  <div class="container">

  
    <p class="subtitle">Centro de atalhos</p>

    <div class="button-grid">

      <!-- ALTERAR LINKS AQUI -->

      <a href="https://google.pt" class="hub-button">Google</a>

      <a href="https://google.pt" class="hub-button">Google</a>
      
      <a href="https://radioonline.com.pt/" class="hub-button">Radio</a>   
      
    </div>

</body>
</html>
