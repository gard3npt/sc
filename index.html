<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>SC</title>

  <!-- Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:'Montserrat', sans-serif;
      background:#121417;
      color:#ffffff;
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      overflow:hidden;
      position:relative;
    }

    /* Fundo minimalista */

    .background-letters{
      position:absolute;
      inset:0;
      display:flex;
      justify-content:center;
      align-items:center;
      pointer-events:none;
      user-select:none;
    }

    /* Imagem de fundo */

    .background-letters img{
      width:100%;
      height:100%;
      object-fit:cover;
      object-position:center center;
      opacity:0.25;
      transform:scale(1.02);
    }

    /* Ajustes para diferentes tamanhos de ecrã */

    @media (max-width:1200px){
      .background-letters img{
        object-position:center top;
      }
    }

    @media (max-width:900px){
      .background-letters img{
        object-position:65% center;
        opacity:0.20;
      }
    }

    @media (max-width:700px){
      .background-letters img{
        object-position:70% center;
        transform:scale(1.08);
      }
    }

    @media (max-width:500px){
      .background-letters img{
        object-position:75% center;
        transform:scale(1.15);
        opacity:0.18;
      }
    }

    /* Container principal */

    .container{
      width:100%;
      max-width:1000px;
      padding:40px 25px;
      z-index:2;
      text-align:center;
      display:none;
    }

    .title{
      font-size:4rem;
      font-weight:900;
      letter-spacing:10px;
      margin-bottom:10px;
    }

    .subtitle{
      color:#8f98a3;
      margin-bottom:60px;
      letter-spacing:3px;
      text-transform:uppercase;
      font-size:0.9rem;
    }

    /* Grid dos botões */

    .button-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(220px, 1fr));
      gap:28px;
    }

    .hub-button{
      background:#1B1F24;
      border:1px solid rgba(255,255,255,0.05);
      border-radius:20px;
      padding:28px 20px;
      text-decoration:none;
      color:white;
      font-size:1.4rem;
      font-weight:700;
      transition:0.3s ease;
      position:relative;
      overflow:hidden;
    }

    .hub-button:hover{
      transform:translateY(-5px);
      background:#232931;
      border-color:rgba(255,255,255,0.12);
      box-shadow:0 10px 30px rgba(0,0,0,0.3);
    }

    .hub-button::before{
      content:"";
      position:absolute;
      top:0;
      left:-100%;
      width:100%;
      height:100%;
      background:linear-gradient(
        120deg,
        transparent,
        rgba(255,255,255,0.05),
        transparent
      );
      transition:0.5s;
    }

    .hub-button:hover::before{
      left:100%;
    }

    footer{
      margin-top:60px;
      color:#5e6670;
      font-size:0.8rem;
      letter-spacing:2px;
    }

    /* Ecrã da senha */

    .login-screen{
      position:fixed;
      inset:0;
      background:#121417;
      display:flex;
      justify-content:center;
      align-items:center;
      z-index:999;
    }

    .login-box{
      background:#1B1F24;
      padding:40px;
      border-radius:24px;
      width:90%;
      max-width:400px;
      text-align:center;
      border:1px solid rgba(255,255,255,0.08);
      box-shadow:0 15px 40px rgba(0,0,0,0.4);
    }

    .login-box h2{
      margin-bottom:25px;
      font-size:2rem;
      letter-spacing:2px;
    }

    .password-input{
      width:100%;
      padding:16px;
      border:none;
      border-radius:14px;
      background:#2A313A;
      color:white;
      font-size:1rem;
      margin-bottom:20px;
      outline:none;
    }

    .login-button{
      width:100%;
      padding:16px;
      border:none;
      border-radius:14px;
      background:#ffffff;
      color:#121417;
      font-weight:700;
      cursor:pointer;
      transition:0.3s ease;
      font-size:1rem;
    }

    .login-button:hover{
      opacity:0.9;
      transform:translateY(-2px);
    }

    .error-message{
      color:#ff6b6b;
      margin-top:15px;
      display:none;
      font-size:0.9rem;
    }

    /* Mobile */

    @media(max-width:700px){

      .title{
        font-size:2.5rem;
        letter-spacing:5px;
      }

      .subtitle{
        margin-bottom:40px;
      }

      .hub-button{
        padding:24px 16px;
        font-size:1.2rem;
      }

      .background-letters h1{
        font-size:40vw;
      }

    }

  </style>
</head>

<body>

  <!-- Ecrã da senha -->

  <div class="login-screen" id="loginScreen">
    <div class="login-box">
      <h2>Acesso Restrito</h2>

      <input
        type="password"
        id="passwordInput"
        class="password-input"
        placeholder="Introduza a senha"
      >

      <button class="login-button" onclick="checkPassword()">
        Entrar
      </button>

      <div class="error-message" id="errorMessage">
        Senha incorreta.
      </div>
    </div>
  </div>

  <!-- Letras de fundo -->

  <div class="background-letters">
    <img src="SC Template_PPT.jpg" alt="Fundo Sumol Compal">
  </div>

  <!-- Conteúdo -->

  <div class="container" id="mainContent">

    <h1 class="title">Laboratório</h1>

    <p class="subtitle">Links:</p>

    <div class="button-grid">

      <!-- ALTERAR LINKS AQUI -->

      <a href="03-apoio_produção.html" class="hub-button">Apoio Produção</a>

      <a href="02-embalagens.html" class="hub-button">Embalagens</a>

      <a href="https://www.ipma.pt/pt/otempo/prev.localidade.hora/#Santar%C3%A9m&Almeirim" class="hub-button">IPMA Almeirim</a>

      <a href="https://intranet.sumolcompal.pt" class="hub-button">Intranet</a>

      <a href="https://radioonline.com.pt/" class="hub-button">Radio</a>

    </div>

  </div>

  <script>

    // ALTERAR A SENHA AQUI
    const correctPassword = "0";

    function checkPassword(){

      const input = document.getElementById("passwordInput").value;
      const error = document.getElementById("errorMessage");

      if(input === correctPassword){

        document.getElementById("loginScreen").style.display = "none";
        document.getElementById("mainContent").style.display = "block";

      } else {

        error.style.display = "block";

      }

    }

    // Enter para entrar

    document.getElementById("passwordInput").addEventListener("keypress", function(event){

      if(event.key === "Enter"){
        checkPassword();
      }

    });

  </script>

</body>
</html>
