<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

   <title>SC</title>

   <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">

  <!-- Google Ads -->
  <script async
    src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4094039418988922"
    crossorigin="anonymous">
  </script>

  <!-- Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:'Montserrat', sans-serif;
      background:#121417;
      color:#ffffff;
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      overflow:auto;
      position:relative;
    }

    /* Fundo */

    .background-letters{
      position:absolute;
      inset:0;
      display:flex;
      justify-content:center;
      align-items:center;
      pointer-events:none;
      user-select:none;
    }

    .background-letters img{
      width:100%;
      height:100%;
      object-fit:cover;
      object-position:center center;
      opacity:0.25;
      transform:scale(1.02);
    }

    @media (max-width:1200px){
      .background-letters img{
        object-position:center top;
      }
    }

    @media (max-width:900px){
      .background-letters img{
        object-position:65% center;
        opacity:0.20;
      }
    }

    @media (max-width:700px){
      .background-letters img{
        object-position:70% center;
        transform:scale(1.08);
      }
    }

    @media (max-width:500px){
      .background-letters img{
        object-position:75% center;
        transform:scale(1.15);
        opacity:0.18;
      }
    }

    /* Container */

    .container{
      width:100%;
      max-width:1000px;
      padding:40px 25px;
      z-index:2;
      text-align:center;
      display:none;
    }

    .title{
      font-size:4rem;
      font-weight:900;
      letter-spacing:10px;
      margin-bottom:10px;
    }

    .subtitle{
      color:#8f98a3;
      margin-bottom:60px;
      letter-spacing:3px;
      text-transform:uppercase;
      font-size:0.9rem;
    }

    /* Botões */

    .button-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(220px, 1fr));
      gap:28px;
    }

    .hub-button{
      background:#1B1F24;
      border:1px solid rgba(255,255,255,0.05);
      border-radius:20px;
      padding:28px 20px;
      text-decoration:none;
      color:white;
      font-size:1.4rem;
      font-weight:700;
      transition:0.3s ease;
      position:relative;
      overflow:hidden;
      cursor:pointer;
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .hub-button:hover{
      transform:translateY(-5px);
      background:#232931;
      border-color:rgba(255,255,255,0.12);
      box-shadow:0 10px 30px rgba(0,0,0,0.3);
    }

    .hub-button::before{
      content:"";
      position:absolute;
      top:0;
      left:-100%;
      width:100%;
      height:100%;
      background:linear-gradient(
        120deg,
        transparent,
        rgba(255,255,255,0.05),
        transparent
      );
      transition:0.5s;
    }

    .hub-button:hover::before{
      left:100%;
    }

    /* Páginas internas */

    .page-title{
      font-size:2rem;
      margin-bottom:30px;
    }

    .back-button{
      margin-bottom:30px;
      padding:14px 20px;
      border:none;
      border-radius:14px;
      background:#232931;
      color:white;
      cursor:pointer;
      font-weight:700;
      transition:0.3s;
    }

    .back-button:hover{
      background:#2f3742;
    }

    /* LOGIN */

    .login-screen{
      position:fixed;
      inset:0;

      background:
        linear-gradient(rgba(18,20,23,0.75), rgba(18,20,23,0.75)),
        url("SC Template_PPT.jpg");

      background-size:cover;
      background-position:center;

      display:flex;
      justify-content:center;
      align-items:center;
      z-index:999;
    }

    .login-box{
      background:rgba(27,31,36,0.90);
      backdrop-filter:blur(8px);
      padding:40px;
      border-radius:24px;
      width:90%;
      max-width:400px;
      text-align:center;
      border:1px solid rgba(255,255,255,0.08);
      box-shadow:0 15px 40px rgba(0,0,0,0.4);
    }

    .login-box h2{
      margin-bottom:25px;
      font-size:2rem;
      letter-spacing:2px;
    }

    .password-input{
      width:100%;
      padding:16px;
      border:none;
      border-radius:14px;
      background:#2A313A;
      color:white;
      font-size:1rem;
      margin-bottom:20px;
      outline:none;
    }

    .login-button{
      width:100%;
      padding:16px;
      border:none;
      border-radius:14px;
      background:#ffffff;
      color:#121417;
      font-weight:700;
      cursor:pointer;
      transition:0.3s ease;
      font-size:1rem;
    }

    .login-button:hover{
      opacity:0.9;
      transform:translateY(-2px);
    }

    .error-message{
      color:#ff6b6b;
      margin-top:15px;
      display:none;
      font-size:0.9rem;
    }

    /* Mobile */

    @media(max-width:700px){

      .title{
        font-size:2.5rem;
        letter-spacing:5px;
      }

      .subtitle{
        margin-bottom:40px;
      }

      .hub-button{
        padding:24px 16px;
        font-size:1.2rem;
      }

    }

  </style>
</head>

<body>

  <!-- LOGIN -->

  <div class="login-screen" id="loginScreen">

    <div class="login-box">

      <h2>Acesso Restrito</h2>

      <input
        type="password"
        id="passwordInput"
        class="password-input"
        placeholder="Introduza a senha"
      >

      <button class="login-button" onclick="checkPassword()">
        Entrar
      </button>

      <div class="error-message" id="errorMessage">
        Senha incorreta.
      </div>

    </div>

  </div>

  <!-- Fundo -->

  <div class="background-letters">
    <img src="SC Template_PPT.jpg" alt="Fundo Sumol Compal">
  </div>

  <!-- Conteúdo -->

  <div class="container" id="mainContent">

    <h1 class="title">Laboratório</h1>

    <p class="subtitle">Links:</p>

    <!-- MENU PRINCIPAL -->

    <div class="button-grid" id="mainMenu">

      <div onclick="showApoio()" class="hub-button">
        Apoio Produção
      </div>

      <div onclick="showEmbalagens()" class="hub-button">
        Embalagens
      </div>

      <a href="https://intranet.sumolcompal.pt"
         target="_blank"
         class="hub-button">
         Intranet
      </a>

      <a href="https://www.ipma.pt/pt/index.html"
         target="_blank"
         class="hub-button">
         IPMA →
      </a>

      <a href="https://radioonline.com.pt/"
         target="_blank"
         class="hub-button">
         Rádio →
      </a>

    </div>

    <!-- APOIO PRODUÇÃO -->

    <div id="apoioPage" style="display:none; margin-top:40px;">

      <button onclick="showHome()" class="back-button">
        ← Voltar
      </button>

      <h2 class="page-title">
        Apoio Produção
      </h2>

      <div class="button-grid">

        <a href="https://google.pt"
           target="_blank"
           class="hub-button">
           Google
        </a>

        <a href="https://google.pt"
           target="_blank"
           class="hub-button">
           Google
        </a>

        <a href="https://radioonline.com.pt/"
           target="_blank"
           class="hub-button">
           Rádio
        </a>

      </div>

    </div>

    <!-- EMBALAGENS -->

    <div id="embalagensPage" style="display:none; margin-top:40px;">

      <button onclick="showHomeFromEmbalagens()" class="back-button">
        ← Voltar
      </button>

      <h2 class="page-title">
        Embalagens
      </h2>

      <p class="subtitle">
        Centro de atalhos
      </p>

      <div class="button-grid">

        <a href="http://10.167.1.4/login"
           target="_blank"
           class="hub-button">
           Accept
        </a>

        <a href="http://10.167.1.4:8181/pt/home#/"
           target="_blank"
           class="hub-button">
           Accept MSA
        </a>

        <a href="http://10.167.1.4/login"
           target="_blank"
           class="hub-button">
           PLMS
        </a>

        <a href="https://sumolcompal.sharepoint.com/sites/QualidadeAmbiente/Qual_Almeirim/Forms/AllItems.aspx?id=%2Fsites%2FQualidadeAmbiente%2FQual%5FAlmeirim%2F04%2E%20Actividades%2F03%2E%20Embalagem&viewid=cc397437%2D7114%2D4d36%2Da30a%2Dc5729209ff32&sharingv2=true&fromShare=true&at=9&clickparams=eyAiWC1BcHBOYW1lIiA6ICJNaWNyb3NvZnQgT3V0bG9vayIsICJYLUFwcFZlcnNpb24iIDogIjE2LjAuMTkxMjcuMjAzMTQiLCAiT1MiIDogIldpbmRvd3MiIH0%3D&CID=1a77d6a1%2De0e3%2De000%2D7cf3%2Db5bfacfe038a&cidOR=SPO&FolderCTID=0x0120002EAA8AF434FADD4B82052C2C6ADB17AB"
           target="_blank"
           class="hub-button">
           SharePoint - 03 Emb.
        </a>
                
      </div>

    </div>

  </div>

  <script>

    // PASSWORD

    const correctPassword = "0";

    function checkPassword(){

      const input = document.getElementById("passwordInput").value;
      const error = document.getElementById("errorMessage");

      if(input === correctPassword){

        document.getElementById("loginScreen").style.display = "none";
        document.getElementById("mainContent").style.display = "block";

      } else {

        error.style.display = "block";

      }

    }

    // ENTER

    document.getElementById("passwordInput").addEventListener("keypress", function(event){

      if(event.key === "Enter"){
        checkPassword();
      }

    });

    // APOIO PRODUÇÃO

    function showApoio(){

      document.getElementById("mainMenu").style.display = "none";

      document.getElementById("apoioPage").style.display = "block";

    }

    function showHome(){

      document.getElementById("mainMenu").style.display = "grid";

      document.getElementById("apoioPage").style.display = "none";

    }

    // EMBALAGENS

    function showEmbalagens(){

      document.getElementById("mainMenu").style.display = "none";

      document.getElementById("embalagensPage").style.display = "block";

    }

    function showHomeFromEmbalagens(){

      document.getElementById("mainMenu").style.display = "grid";

      document.getElementById("embalagensPage").style.display = "none";

    }

  </script>

</body>
</html>
